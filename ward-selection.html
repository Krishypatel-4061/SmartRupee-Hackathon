<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c3bed",
                        "background-light": "#f7f6f8",
                        "background-dark": "#08051A",
                        "card-dark": "#13102B",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Ward Selection Portal | SmartRupee</title>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen relative overflow-x-hidden">
<div class="fixed inset-0 z-0 blur-md opacity-40 pointer-events-none">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between border-b border-primary/20 px-10 py-3">
<div class="flex items-center gap-4">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">account_balance_wallet</span>
</div>
<h2 class="text-lg font-bold tracking-tight">SmartRupee</h2>
</div>
</header>
<main class="p-10 grid grid-cols-3 gap-6">
<div class="h-40 bg-primary/10 rounded-xl"></div>
<div class="h-40 bg-primary/10 rounded-xl"></div>
<div class="h-40 bg-primary/10 rounded-xl"></div>
<div class="col-span-3 h-96 bg-primary/5 rounded-xl"></div>
</main>
</div>
</div>
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
<div class="w-full max-w-5xl bg-card-dark border border-primary/20 rounded-xl shadow-2xl overflow-hidden">
<div class="p-8 text-center border-b border-primary/10">
<div class="inline-flex items-center justify-center p-3 rounded-full bg-primary/10 text-primary mb-4">
<span class="material-symbols-outlined text-4xl">group</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-100">Select a Ward to Manage</h1>
<p id="welcome-message" class="mt-2 text-slate-400">Welcome back. Please choose a student profile to continue.</p>
</div>
<div id="ward-container" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Dynamic Ward Cards will be injected here -->
    
    <!-- Hardcoded cards removed as per request -->
</div>
<div class="bg-primary/5 p-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-primary/10">
<div class="flex items-center gap-2 text-slate-400 text-sm">
<span class="material-symbols-outlined text-primary">verified_user</span>
<span>Secure Session Encryption Active</span>
</div>
<div class="flex gap-4">
<button id="logout-btn" class="text-slate-400 hover:text-slate-100 text-sm font-medium transition-colors">Logout</button>
<button class="text-primary hover:text-primary/80 text-sm font-bold transition-colors">Support Center</button>
</div>
</div>
</div>
</div>
<div class="fixed bottom-6 left-0 right-0 text-center z-50 pointer-events-none">
<p class="text-slate-500 text-sm">© 2024 SmartRupee Digital Systems • Secure Parent Gateway</p>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- Auth Check ---
        const loggedInParent = JSON.parse(localStorage.getItem('loggedInParent'));
        if (!loggedInParent) {
            window.location.href = 'verification.html';
            return;
        }

        // --- UI Elements ---
        const welcomeMessage = document.getElementById('welcome-message');
        const wardContainer = document.getElementById('ward-container');
        const logoutBtn = document.getElementById('logout-btn');

        welcomeMessage.textContent = `Welcome back, ${loggedInParent.parentName}. Please choose a student profile to continue.`;

        // --- Render Wards ---
        const renderWards = () => {
            wardContainer.innerHTML = '';
            
            // 1. Render existing wards
            loggedInParent.wards.forEach((ward, index) => {
                const card = document.createElement('div');
                card.className = 'group relative flex flex-col items-center p-6 bg-primary/5 border border-transparent hover:border-primary rounded-xl transition-all duration-300 cursor-pointer';
                
                // Use a generic avatar or a placeholder based on name
                const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${ward.studentName}`;
                
                card.innerHTML = `
                    <div class="relative mb-4">
                        <div class="size-24 rounded-full overflow-hidden border-2 border-primary/30 group-hover:border-primary transition-colors">
                            <img alt="Student Portrait" class="w-full h-full object-cover" src="${avatarUrl}"/>
                        </div>
                        <div class="absolute bottom-0 right-0 size-6 bg-green-500 border-2 border-card-dark rounded-full"></div>
                    </div>
                    <h3 class="text-xl font-bold text-slate-100">${ward.studentName}</h3>
                    <div class="mt-1 flex flex-col items-center space-y-1">
                        <span class="text-sm font-medium text-primary bg-primary/10 px-3 py-0.5 rounded-full">ID: ${ward.studentId}</span>
                        <p class="text-sm text-slate-400">${ward.grade} • ${ward.school}</p>
                    </div>
                    <button class="mt-6 w-full py-2.5 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2">
                        <span>Select ${ward.studentName.split(' ')[0]}</span>
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                `;
                
                card.addEventListener('click', () => {
                    // Save that ward as selectedWard
                    localStorage.setItem('selectedWard', JSON.stringify(ward));
                    // Redirect to the Parent Dashboard
                    window.location.href = 'index.html';
                });
                
                wardContainer.appendChild(card);
            });

            // 2. Render "Add New Ward" card
            const addCard = document.createElement('div');
            addCard.className = 'group relative flex flex-col items-center justify-center p-6 bg-transparent border-2 border-dashed border-primary/30 hover:border-primary hover:bg-primary/5 rounded-xl transition-all duration-300 cursor-pointer';
            addCard.innerHTML = `
                <div class="flex flex-col items-center py-4">
                    <div class="size-20 rounded-full border-2 border-dashed border-primary/40 group-hover:border-primary group-hover:bg-primary/10 flex items-center justify-center transition-all duration-300 mb-4">
                        <span class="material-symbols-outlined text-4xl text-primary/60 group-hover:text-primary">add</span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-300 group-hover:text-slate-100 transition-colors">Add New Ward</h3>
                    <p class="mt-2 text-xs text-slate-500 text-center max-w-[150px]">Link another child to your management portal</p>
                </div>
            `;
            
            addCard.addEventListener('click', () => {
                window.location.href = 'add-new-ward.html';
            });
            
            wardContainer.appendChild(addCard);
        };

        renderWards();

        // --- Logout ---
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('loggedInParent');
            localStorage.removeItem('selectedWard');
            window.location.href = 'verification.html';
        });
    });
</script>

</body></html>
